<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mirakıl ToDo</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- ── Auth Screen ── -->
<div id="authScreen">
    <div class="auth-container">
        <h1>Mirakıl ToDo</h1>
        <p class="auth-subtitle">Projelerini kolayca yönet</p>
        <div class="auth-box">
            <h2 id="authTitle">Giriş Yap</h2>
            <div id="authMessage" class="auth-message hidden"></div>
            <input type="email" id="emailInput" placeholder="E-posta adresi">
            <input type="password" id="passwordInput" placeholder="Şifre">
            <button class="btn-primary" id="authBtn">Giriş Yap</button>
            <div class="auth-toggle">
                <span id="authToggleText">Hesabın yok mu?</span>
                <a id="authToggleLink">Kayıt Ol</a>
            </div>
        </div>
    </div>
</div>

<!-- ── Boards Screen ── -->
<div id="boardsScreen" class="hidden">
    <div class="topbar">
        <div class="topbar-brand" onclick="App.showBoards()">Mirakıl ToDo</div>
        <div class="topbar-title"></div>
        <span class="topbar-email" id="userEmailBoards"></span>
        <button class="logout-btn" onclick="App.logout()">Çıkış</button>
    </div>
    <div class="boards-wrapper">
        <h2>Panolarım</h2>
        <div class="boards-grid" id="boardsGrid"></div>
    </div>
</div>

<!-- ── Board Detail Screen ── -->
<div id="boardDetailScreen" class="hidden">
    <div class="topbar">
        <div class="topbar-brand" onclick="App.goBackToBoards()">Mirakıl ToDo</div>
        <button class="topbar-back" onclick="App.goBackToBoards()">&#8592; Panolar</button>
        <div class="topbar-title" id="boardTitle"></div>
        <span class="topbar-email" id="userEmailDetail"></span>
        <button class="logout-btn" onclick="App.logout()">Çıkış</button>
    </div>
    <div class="board-view" id="listsContainer"></div>
</div>

<script src="config.js"></script>
<script src="auth.js"></script>
<script src="board.js"></script>
<script src="dragdrop.js"></script>
<script src="app.js"></script>
</body>
</html>
